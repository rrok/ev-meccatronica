<section id="officina" class="section-darker">
  <div class="container">
    <div class="row align-items-center">

      <!-- Testo + attrezzatura -->
      <div class="col-lg-6 mb-4 mb-lg-0">
        <h2 class="section-title anim-fade-left">L'Officina Tech</h2>
        <p class="section-subtitle anim-fade-left anim-delay-1">
          130 m² di tecnologia e potenza al servizio della tua auto.
        </p>

        <div class="row g-3">
          @for (eq of equipment; track eq.label; let i = $index) {
            <div class="col-sm-6 anim-fade-left" [style.transition-delay]="((i + 2) * 0.1) + 's'">
              <div class="glass-card text-center py-3">
                <i class="bi {{ eq.icon }} icon-neon" style="font-size:1.8rem;"></i>
                <h6 class="mt-2 mb-1" style="font-family:'Oswald',sans-serif; font-size:0.9rem;">{{ eq.label }}</h6>
                <small style="color:#9e9e9e;">{{ eq.detail }}</small>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Foto titolare -->
      <div class="col-lg-6 anim-fade-right anim-delay-2">
        <div class="position-relative" style="border-radius:12px; overflow:hidden; border:1px solid rgba(57,255,20,0.1);">
          <img [src]="officina.image" [alt]="officina.imageAlt" class="w-100" style="display:block;" loading="lazy" />
          <div class="position-absolute bottom-0 start-0 end-0 p-3"
               style="background:linear-gradient(transparent, rgba(10,10,10,0.9));">
            <small class="d-block" style="color:#39ff14; font-family:'Oswald',sans-serif; letter-spacing:2px;">
              {{ officina.ownerLabel }}
            </small>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
